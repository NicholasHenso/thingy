<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mini FPS</title>
  <style>
    body { margin:0; overflow:hidden; background:#000; }
    canvas { display:block; background:#222; }
    #hud {
      position:fixed; top:10px; left:10px; color:#0f0;
      font-family:monospace; font-size:14px;
    }
  </style>
</head>
<body>
<div id="hud">WASD to move • Mouse to aim • Click to shoot</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  speed: 4,
  gun: 'Plasma Rifle'
};

const keys = {};
const bullets = [];
const enemies = [];

// spawn some enemies
for (let i = 0; i < 8; i++) {
  enemies.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: 20,
    hp: 3
  });
}

let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;
let score = 0;

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

canvas.addEventListener('click', () => {
  // create a bullet from player toward mouse
  const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(angle) * 10,
    vy: Math.sin(angle) * 10,
    life: 60
  });
});

function update() {
  // movement
  if (keys['w']) player.y -= player.speed;
  if (keys['s']) player.y += player.speed;
  if (keys['a']) player.x -= player.speed;
  if (keys['d']) player.x += player.speed;

  // clamp to screen
  player.x = Math.max(0, Math.min(canvas.width, player.x));
  player.y = Math.max(0, Math.min(canvas.height, player.y));

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0) bullets.splice(i, 1);
  }

  // enemies move slowly toward player
  for (const e of enemies) {
    const ang = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(ang) * 1.2;
    e.y += Math.sin(ang) * 1.2;
  }

  // collisions bullet vs enemy
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = b.x - e.x;
      const dy = b.y - e.y;
      if (dx*dx + dy*dy < e.r*e.r) {
        bullets.splice(i, 1);
        e.hp--;
        if (e.hp <= 0) {
          enemies.splice(j, 1);
          score += 10;
        }
        break;
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // background
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // player (simple circle)
  ctx.fillStyle = '#0f0';
  ctx.beginPath();
  ctx.arc(player.x, player.y, 15, 0, Math.PI * 2);
  ctx.fill();

  // gun line toward mouse
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(player.x, player.y);
  ctx.lineTo(mouseX, mouseY);
  ctx.stroke();

  // bullets
  ctx.fillStyle = '#ff0';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // enemies
  for (const e of enemies) {
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // crosshair
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mouseX - 10, mouseY);
  ctx.lineTo(mouseX + 10, mouseY);
  ctx.moveTo(mouseX, mouseY - 10);
  ctx.lineTo(mouseX, mouseY + 10);
  ctx.stroke();

  // HUD
  ctx.fillStyle = '#0f0';
  ctx.font = '16px monospace';
  ctx.fillText('Gun: ' + player.gun, 20, 30);
  ctx.fillText('Score: ' + score, 20, 50);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
