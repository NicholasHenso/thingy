<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Web Game Framework</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 18px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid lime;
            border-radius: 50%;
            z-index: 5;
            pointer-events: none;
        }
        #weaponInfo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: lime;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            min-width: 200px;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>FPS: <span id="fps">60</span></div>
        <div>Enemies: <span id="enemyCount">0</span></div>
        <div>Health: <span id="health">100</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="weaponInfo">
        <div>Weapon: <span id="weaponName">9MM</span></div>
        <div>Ammo: <span id="ammo">30</span> / <span id="maxAmmo">30</span></div>
        <div>Damage: <span id="damage">10</span></div>
    </div>
    <div id="instructions">
        <strong>Controls:</strong><br>
        WASD - Move<br>
        Mouse - Look Around<br>
        Click - Shoot<br>
        1-4 - Switch Weapons<br>
        R - Reload<br>
        Space - Jump
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
